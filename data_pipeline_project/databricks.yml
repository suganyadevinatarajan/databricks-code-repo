# This is a Databricks asset bundle definition for data_pipeline_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: data_pipeline_project
  uuid: 73324403-6f7d-43ad-9781-4e420974a266

#include:
#  - resources/*.yml

#artifacts:
  #python_artifact:
   # type: whl
   # build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use


# ---------------------------------------------------------------------------
#  Define your Job and chain your Medallion tasks here
# ---------------------------------------------------------------------------
resources:
  jobs:
    logistics_medallion_pipeline:
      name: "[${bundle.target}] Logistics Data Pipeline"
     # job_clusters:
     #   - job_cluster_key: standard_cluster
     #     new_cluster:
     #       spark_version: "13.3.x-scala2.12"
     #       node_type_id: "Standard_DS3_v2" 
     #       num_workers: 2
     #       data_security_mode: "SINGLE_USER"
            

      tasks:
        # Task 1: Bronze
        - task_key: run_bronze
          notebook_task:
            notebook_path: ./src/bronze/bronze_ingest3.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
         # job_cluster_key: standard_cluster

        # Task 2: Silver (Runs after Bronze)
        - task_key: run_silver
          depends_on:
            - task_key: run_bronze
          notebook_task:
            notebook_path: ./src/silver/silver_standardize_enrich4.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
        #  job_cluster_key: standard_cluster

        # Task 3: Gold Core (Runs after Silver)
        - task_key: run_gold_core
          depends_on:
            - task_key: run_silver
          notebook_task:
            notebook_path: ./src/gold_curated/gold_core_curated5a.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
         # job_cluster_key: standard_cluster

        # Task 4a: Gold Analytics (Runs after Gold Core)
        - task_key: run_gold_advanced
          depends_on:
            - task_key: run_gold_core
          notebook_task:
            notebook_path: ./src/gold_curated/gold_analytics_advanced5b.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
         # job_cluster_key: standard_cluster

        # Task 4b: Gold Reporting (Runs parallel to Analytics, after Gold Core)
        - task_key: run_gold_reporting
          depends_on:
            - task_key: run_gold_core
          notebook_task:
            notebook_path: ./src/gold_curated/gold_analytics_reporting5b.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
        #  job_cluster_key: standard_cluster
# ---------------------------------------------------------------------------

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-e15125f8-8eb5.cloud.databricks.com
    variables:
      catalog: catalog2_we47
      schema: ${workspace.current_user.short_name}

  # ---------------------------------------------------------
  # QA ENVIRONMENT
  # ---------------------------------------------------------
  qa:
    mode: production
    workspace:
      # REPLACE WITH YOUR ACTUAL QA WORKSPACE URL 
      # (If you only have one workspace for everything, use the same URL as dev)
      host: https://dbc-e15125f8-8eb5.cloud.databricks.com
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: catalog2_we47
      schema: schema2_we47
    permissions:
      - user_name: suganyadevi2803@gmail.com
